<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App — SAP Application Frontend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: '72', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);
            color: #e8edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 3rem 3.5rem;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo {
            width: 56px; height: 56px; margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #0070f2, #00b4d8);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 700; color: #fff;
        }
        h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.75rem; }
        p { color: #8fa3bf; line-height: 1.6; margin-bottom: 0.5rem; }
        .tag {
            display: inline-block; margin-top: 1.5rem;
            background: rgba(0,112,242,0.15);
            color: #5fb7ff;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">AF</div>
        <h1>Deployed to Application Frontend</h1>
        <p>This app was deployed using <strong>afctl</strong> CLI with automated GitHub Actions.</p>
        <p>Replace this page with your own application.</p>
        <span class="tag">Template v1.0</span>
    </div>
</body>
</html>
